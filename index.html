<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Прайс-лист товарів</title>

  <!-- Шрифт Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      margin: 0;
      background: #f9f9f9;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e6e6e6;
      padding: 20px 16px;
    }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo {
      max-height: 80px;
      width: auto;
    }
    h1 {
      margin: 0;
      font-size: 52px;
      color: #2e7d32;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }
    .phone-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 600;
      color: #2e7d32;
    }
    .phone-icon { font-size: 28px; }
    .phone-link { color: #2e7d32; text-decoration: none; }
    .phone-link:hover { text-decoration: underline; }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }
    input[type="search"] {
      flex: 1;
      max-width: 400px;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      background: #fff;
      font-size: 16px;
    }
    button {
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-size: 16px;
    }
    button:hover { background: #f2f2f2; }

    .status { margin-top: 10px; font-weight: 700; text-align: center; font-size: 16px; }
    .error { color: #d32f2f; white-space: pre-wrap; text-align: left; margin-top: 10px; font-size: 15px; }

    .categories-bar {
      margin: 15px 0;
      padding: 10px 0;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e6e6e6;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 14px;
    }
    .cat-chip {
      padding: 8px 18px;
      background: #f0f0f0;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      border: 1px solid #ddd;
      white-space: nowrap;
    }
    .cat-chip:hover { background: #e0e0e0; }
    .cat-chip.active { background: #2e7d32; color: white; border-color: #2e7d32; }
    .cat-chip .badge {
      margin-left: 8px;
      background: rgba(0,0,0,0.18);
      color: inherit;
      padding: 3px 9px;
      border-radius: 14px;
      font-size: 12px;
    }

    .content { padding: 10px 0; }
    .group { margin: 25px 0; border: 1px solid #e6e6e6; border-radius: 14px; overflow: hidden; background: #fff; }
    .group-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: #f8fff8; cursor: pointer; font-weight: 700; }
    .group-header small { font-weight: normal; color: #555; }
    .group-body { padding: 0; overflow-x: auto; }

    table {
      width: 100%;
      min-width: 1400px;          /* ширша таблиця */
      margin: 0 auto;
      border-collapse: collapse;
      background: white;
      table-layout: fixed;
    }
    th, td {
      padding: 8px 10px;          /* менші відступи */
      border: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th {
      background: #2e7d32;
      color: white;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    tr:nth-child(even) { background: #f8fff8; }

    /* Ширина колонок (можеш змінювати відсотки) */
    th:nth-child(1), td:nth-child(1) { width: 10%; }   /* Фото */
    th:nth-child(2), td:nth-child(2) { width: 35%; }   /* Назва — ширше */
    th:nth-child(3), td:nth-child(3) { width: 10%; }   /* ID */
    th:nth-child(4), td:nth-child(4) { width: 10%; }   /* Ціна */
    th:nth-child(5), td:nth-child(5) { width: 30%; }   /* Опис — ширше */
    th:nth-child(6), td:nth-child(6) { width: 5%; }    /* Деталі */

    img {
      max-width: 140px;
      height: auto;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
    }
    .muted { color: #666; font-weight: normal; }
    .details-btn {
      background: #ffc107;
      color: #333;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .details-btn:hover { background: #ffb300; }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
      overflow: auto;
    }
    .modal-content {
      background: #fff;
      margin: 6% auto;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 750px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      position: relative;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover { color: #000; }
    .modal img { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; }
    .modal h2 { margin-top: 0; color: #2e7d32; }
    .modal p { margin: 12px 0; line-height: 1.7; font-size: 16px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="wrap">
      <div class="header-inner">
        <div class="logo-container">
          <!-- Заміни на свій логотип -->
          <img src="https://via.placeholder.com/80x80/2e7d32/ffffff?text=Logo" alt="Логотип" class="logo">
        </div>

        <h1>Прайс-лист товарів</h1>

        <div class="phone-container">
          <span class="phone-icon">📞</span>
          <a href="tel:+380681234567" class="phone-link">+38 (068) 123-45-67</a>
        </div>
      </div>

      <div class="controls">
        <input id="q" type="search" placeholder="Пошук: назва або ID…" />
        <button id="reloadBtn" type="button">🔄 Оновити</button>
        <button id="clearBtn" type="button">🧹 Скинути</button>
      </div>
      <div id="status" class="status">Завантаження…</div>
      <div id="error" class="error" style="display:none;"></div>

      <div class="categories-bar" id="catBar"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="content">
      <div id="output"></div>
    </div>
  </div>

  <!-- Модальне вікно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">×</span>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
(async () => {
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  const outputEl = document.getElementById("output");
  const catBarEl = document.getElementById("catBar");
  const qEl = document.getElementById("q");
  const reloadBtn = document.getElementById("reloadBtn");
  const clearBtn = document.getElementById("clearBtn");
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");
  const closeModal = document.getElementById("closeModal");

  const FEED_URL = "PriceList.xml";

  let rows = [];
  let activeCat = "__ALL__";
  let groups = new Map();
  let categoryMap = new Map();

  reloadBtn.addEventListener("click", () => load());
  clearBtn.addEventListener("click", () => {
    qEl.value = "";
    activeCat = "__ALL__";
    render();
  });
  qEl.addEventListener("input", () => render());

  closeModal.onclick = () => modal.style.display = "none";
  window.onclick = (event) => { if (event.target === modal) modal.style.display = "none"; };

  function textOf(parent, tagName) {
    const el = parent.getElementsByTagName(tagName)[0];
    return el ? (el.textContent || "").trim() : "";
  }

  function readLangText(parent, tagName, lang = "ua") {
    const els = Array.from(parent.getElementsByTagName(tagName));
    if (!els.length) return "";
    const exact = els.find(e => (e.getAttribute("lang") || "").toLowerCase() === lang.toLowerCase());
    return ((exact ? exact.textContent : els[0].textContent) || "").trim();
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normalize(s) {
    return String(s || "").toLowerCase().replace(/\s+/g, " ").trim();
  }

  function getParentCategoryName(catId) {
    let current = categoryMap.get(catId);
    if (!current) return "Без категорії";

    let name = current.name;
    let parentId = current.parentId;

    while (parentId && categoryMap.has(parentId)) {
      current = categoryMap.get(parentId);
      name = current.name;
      parentId = current.parentId;
    }

    return name;
  }

  async function load() {
    try {
      errorEl.style.display = "none";
      errorEl.textContent = "";
      statusEl.textContent = "Завантаження…";
      outputEl.innerHTML = "";

      const resp = await fetch(FEED_URL, { cache: "no-store" });
      if (!resp.ok) throw new Error(`Не вдалося завантажити ${FEED_URL}: ${resp.status}`);

      const xmlText = await resp.text();
      const doc = new DOMParser().parseFromString(xmlText, "text/xml");

      if (doc.getElementsByTagName("parsererror").length > 0) {
        throw new Error("XML не розпарсився");
      }

      categoryMap.clear();
      const categories = doc.getElementsByTagName("category");
      for (const cat of categories) {
        const id = cat.getAttribute("id");
        const name = cat.textContent.trim();
        const parentId = cat.getAttribute("parentId") || null;
        if (id) categoryMap.set(id, { name, parentId });
      }

      rows = [];
      const offers = doc.getElementsByTagName("offer");
      for (const el of offers) {
        const catId = textOf(el, "categoryId") || "";
        let parentCatName = "Без категорії";

        if (catId && categoryMap.has(catId)) {
          parentCatName = getParentCategoryName(catId);
        }

        rows.push({
          cat: parentCatName,
          name: readLangText(el, "name", "ua") || "—",
          descr: readLangText(el, "description", "ua") || "—",
          price: (textOf(el, "price") || "").trim() || "—",
          id: (el.getAttribute("id") || "").trim() || "—",
          picture: (textOf(el, "picture") || "").trim(),
          _search: normalize((readLangText(el, "name", "ua") || "") + " " + (el.getAttribute("id") || "") + " " + parentCatName)
        });
      }

      groups.clear();
      for (const r of rows) {
        if (!groups.has(r.cat)) groups.set(r.cat, []);
        groups.get(r.cat).push(r);
      }

      groups = new Map([...groups.entries()].sort((a, b) => b[1].length - a[1].length));

      if (activeCat !== "__ALL__" && !groups.has(activeCat)) activeCat = "__ALL__";

      render();
    } catch (e) {
      statusEl.textContent = "Помилка";
      errorEl.style.display = "block";
      errorEl.textContent = `Помилка: ${String(e)}`;
    }
  }

  function render(){
    const q = normalize(qEl.value);

    renderCategories(q);

    let filtered = rows;
    if (activeCat !== "__ALL__") filtered = filtered.filter(r => r.cat === activeCat);
    if (q) filtered = filtered.filter(r => r._search.includes(q));

    statusEl.innerHTML = `Товарів: <b>${filtered.length}</b> <span class="muted">(категорія: ${escapeHtml(activeCat === "__ALL__" ? "Усі" : activeCat)})</span>`;

    let renderGroups;
    if (activeCat === "__ALL__") {
      const byCat = new Map();
      for (const r of filtered) {
        if (!byCat.has(r.cat)) byCat.set(r.cat, []);
        byCat.get(r.cat).push(r);
      }
      renderGroups = [...byCat.entries()].sort((a,b) => b[1].length - a[1].length);
    } else {
      renderGroups = [[activeCat, filtered]];
    }

    outputEl.innerHTML = renderGroups.map(([cat, items]) => renderGroup(cat, items)).join("");
  }

  function renderCategories(q) {
    const counts = new Map();
    for (const [cat, items] of groups.entries()) {
      let list = items;
      if (q) list = list.filter(r => r._search.includes(q));
      counts.set(cat, list.length);
    }
    const total = rows.filter(r => !q || r._search.includes(q)).length;

    let html = `
      <div class="cat-chip ${activeCat === "__ALL__" ? "active" : ""}" data-cat="__ALL__">
        Усі <span class="badge">${total}</span>
      </div>
    `;

    [...groups.keys()].forEach(cat => {
      const c = counts.get(cat) || 0;
      html += `
        <div class="cat-chip ${activeCat === cat ? "active" : ""}" data-cat="${escapeHtml(cat)}">
          ${escapeHtml(cat)} <span class="badge">${c}</span>
        </div>
      `;
    });

    catBarEl.innerHTML = html;

    catBarEl.querySelectorAll(".cat-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        activeCat = chip.getAttribute("data-cat");
        render();
      });
    });
  }

  function renderGroup(cat, items){
    const groupId = "g_" + Math.abs(cat.split('').reduce((a, b) => ((a << 5) - a) + b.charCodeAt(0), 0));

    let html = `
      <div class="group">
        <div class="group-header" data-group-toggle="${groupId}">
          <div>${escapeHtml(cat)}</div>
          <small>Товарів: ${items.length}</small>
        </div>
        <div class="group-body" id="${groupId}">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Назва</th>
                <th>ID</th>
                <th>Ціна</th>
                <th>Опис</th>
                <th>Деталі</th>
              </tr>
            </thead>
            <tbody>
    `;

    for(let i = 0; i < items.length; i++){
      const r = items[i];
      const imgTag = r.picture
        ? `<img src="${escapeHtml(r.picture)}" alt="${escapeHtml(r.name)}" onerror="this.src='https://via.placeholder.com/140?text=Немає+фото';">`
        : "—";

      const descrShort = r.descr.length > 160 ? (r.descr.slice(0,160) + "...") : r.descr;

      html += `
        <tr>
          <td>${imgTag}</td>
          <td>${escapeHtml(r.name)}</td>
          <td>${escapeHtml(r.id)}</td>
          <td>${escapeHtml(r.price)}</td>
          <td>${escapeHtml(descrShort)}</td>
          <td><button class="details-btn" onclick="showModal('${escapeHtml(r.name)}', '${escapeHtml(r.id)}', '${escapeHtml(r.price)}', '${escapeHtml(r.picture)}', '${escapeHtml(r.descr)}', '${escapeHtml(r.cat)}')">Деталі</button></td>
        </tr>
      `;
    }

    html += `
            </tbody>
          </table>
        </div>
      </div>
    `;
    return html;
  }

  window.showModal = function(name, id, price, picture, descr, cat) {
    let html = `
      <h2>${escapeHtml(name)}</h2>
      <p><strong>ID:</strong> ${escapeHtml(id)}</p>
      <p><strong>Ціна:</strong> ${escapeHtml(price)}</p>
      <p><strong>Категорія:</strong> ${escapeHtml(cat)}</p>
      ${picture ? `<img src="${escapeHtml(picture)}" alt="${escapeHtml(name)}">` : "<p>Фото відсутнє</p>"}
      <p><strong>Повний опис:</strong><br>${escapeHtml(descr)}</p>
    `;

    modalBody.innerHTML = html;
    modal.style.display = "block";
  };

  load();
})();
</script>
</body>
</html>
