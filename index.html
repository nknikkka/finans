<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Прайс-лист товарів НУШ</title>

  <!-- Шрифт Montserrat (тільки потрібні ваги) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #2e7d32;
      --yellow: #ffc107;
      --light: #f8fff8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f9f9f9;
      color: #333;
      line-height: 1.5;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 16px;
      z-index: 10;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo { max-height: 60px; }

    h1 {
      font-size: 2.2rem;
      color: var(--green);
      font-weight: 700;
      text-align: center;
      flex: 1;
    }

    .phone {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--green);
      font-size: 1.1rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 16px 0;
    }

    input[type="search"] {
      flex: 1;
      min-width: 220px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover { background: #f5f5f5; }

    .status {
      text-align: center;
      font-weight: 600;
      margin: 12px 0;
      color: #555;
    }

    .error {
      color: #d32f2f;
      text-align: center;
      margin: 12px 0;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 12px 0;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .cat-chip {
      padding: 8px 16px;
      background: #f5f5f5;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .cat-chip.active {
      background: var(--green);
      color: white;
    }

    .cat-chip .badge {
      margin-left: 6px;
      background: rgba(0,0,0,0.15);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
    }

    .group {
      margin: 20px 0;
      border: 1px solid #eee;
      border-radius: 10px;
      background: white;
      overflow: hidden;
    }

    .group-header {
      padding: 12px 16px;
      background: var(--light);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .group-body {
      padding: 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 10px;
      border: 1px solid #eee;
      text-align: left;
    }

    th {
      background: var(--green);
      color: white;
      font-weight: 600;
    }

    tr:nth-child(even) { background: var(--light); }

    img {
      max-width: 120px;
      height: auto;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
    }

    .details-btn {
      background: var(--yellow);
      color: #333;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .details-btn:hover { background: #ffb300; }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal-content {
      background: white;
      margin: 40px auto;
      padding: 20px;
      width: 90%;
      max-width: 700px;
      border-radius: 12px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      font-size: 32px;
      cursor: pointer;
      color: #777;
    }

    .close:hover { color: black; }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { position: absolute; top: -9999px; left: -9999px; }
      tr { border: 1px solid #ddd; margin-bottom: 12px; border-radius: 8px; }
      td {
        border: none;
        border-bottom: 1px solid #eee;
        position: relative;
        padding-left: 50%;
        text-align: right;
      }
      td:before {
        position: absolute;
        top: 8px;
        left: 10px;
        width: 45%;
        padding-right: 10px;
        white-space: nowrap;
        font-weight: 600;
        content: attr(data-label);
        text-align: left;
      }
      td img { margin: 8px auto; }
      .details-btn { width: 100%; margin-top: 8px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="wrap">
      <div class="header-inner">
        <div class="logo-container">
          <img src="https://podillyafinance.com.ua/image/catalog/logotype.png" alt="Логотип" class="logo">
        </div>
        <h1>Прайс-лист товарів НУШ</h1>
        <div class="phone-container">
          <span class="phone-icon">📞</span>
          <a href="tel:+380681234567" class="phone-link">+38 (068) 123-45-67</a>
        </div>
      </div>

      <div class="controls">
        <input id="q" type="search" placeholder="Пошук: назва або ID…" />
        <button id="reloadBtn">🔄 Оновити</button>
        <button id="clearBtn">🧹 Скинути</button>
      </div>

      <div id="status" class="status">Завантаження…</div>
      <div id="error" class="error" style="display:none;"></div>

      <div class="categories-bar" id="catBar"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="content">
      <div id="output"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">×</span>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
// Твій скрипт (без змін, він уже легкий)
(async () => {
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  const outputEl = document.getElementById("output");
  const catBarEl = document.getElementById("catBar");
  const qEl = document.getElementById("q");
  const reloadBtn = document.getElementById("reloadBtn");
  const clearBtn = document.getElementById("clearBtn");
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");
  const closeModal = document.getElementById("closeModal");

  const FEED_URL = "PriceList.xml";

  let rows = [];
  let activeCat = "__ALL__";
  let groups = new Map();
  let categoryMap = new Map();

  reloadBtn.addEventListener("click", () => load());
  clearBtn.addEventListener("click", () => {
    qEl.value = "";
    activeCat = "__ALL__";
    render();
  });
  qEl.addEventListener("input", () => render());

  closeModal.onclick = () => modal.style.display = "none";
  window.onclick = (event) => { if (event.target === modal) modal.style.display = "none"; };

  function textOf(parent, tagName) {
    const el = parent.getElementsByTagName(tagName)[0];
    return el ? (el.textContent || "").trim() : "";
  }

  function readLangText(parent, tagName, lang = "ua") {
    const els = Array.from(parent.getElementsByTagName(tagName));
    if (!els.length) return "";
    const exact = els.find(e => (e.getAttribute("lang") || "").toLowerCase() === lang.toLowerCase());
    return ((exact ? exact.textContent : els[0].textContent) || "").trim();
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function normalize(s) {
    return String(s || "").toLowerCase().replace(/\s+/g, " ").trim();
  }

  function getParentCategoryName(catId) {
    let current = categoryMap.get(catId);
    if (!current) return "Без категорії";
    let name = current.name;
    let parentId = current.parentId;
    while (parentId && categoryMap.has(parentId)) {
      current = categoryMap.get(parentId);
      name = current.name;
      parentId = current.parentId;
    }
    return name;
  }

  async function load() {
    try {
      errorEl.style.display = "none";
      errorEl.textContent = "";
      statusEl.textContent = "Завантаження…";
      outputEl.innerHTML = "";
      const resp = await fetch(FEED_URL, { cache: "no-store" });
      if (!resp.ok) throw new Error(`Не вдалося завантажити ${FEED_URL}: ${resp.status}`);
      const xmlText = await resp.text();
      const doc = new DOMParser().parseFromString(xmlText, "text/xml");
      if (doc.getElementsByTagName("parsererror").length > 0) {
        throw new Error("XML не розпарсився");
      }
      categoryMap.clear();
      const categories = doc.getElementsByTagName("category");
      for (const cat of categories) {
        const id = cat.getAttribute("id");
        const name = cat.textContent.trim();
        const parentId = cat.getAttribute("parentId") || null;
        if (id) categoryMap.set(id, { name, parentId });
      }
      rows = [];
      const offers = doc.getElementsByTagName("offer");
      for (const el of offers) {
        const catId = textOf(el, "categoryId") || "";
        let parentCatName = "Без категорії";
        if (catId && categoryMap.has(catId)) {
          parentCatName = getParentCategoryName(catId);
        }
        rows.push({
          cat: parentCatName,
          name: readLangText(el, "name", "ua") || "—",
          descr: readLangText(el, "description", "ua") || "—",
          price: (textOf(el, "price") || "").trim() || "—",
          id: (el.getAttribute("id") || "").trim() || "—",
          picture: (textOf(el, "picture") || "").trim(),
          _search: normalize((readLangText(el, "name", "ua") || "") + " " + (el.getAttribute("id") || "") + " " + parentCatName)
        });
      }
      groups.clear();
      for (const r of rows) {
        if (!groups.has(r.cat)) groups.set(r.cat, []);
        groups.get(r.cat).push(r);
      }
      groups = new Map([...groups.entries()].sort((a, b) => b[1].length - a[1].length));
      if (activeCat !== "__ALL__" && !groups.has(activeCat)) activeCat = "__ALL__";
      render();
    } catch (e) {
      statusEl.textContent = "Помилка";
      errorEl.style.display = "block";
      errorEl.textContent = `Помилка: ${String(e)}`;
    }
  }

  function render(){
    const q = normalize(qEl.value);
    renderCategories(q);
    let filtered = rows;
    if (activeCat !== "__ALL__") filtered = filtered.filter(r => r.cat === activeCat);
    if (q) filtered = filtered.filter(r => r._search.includes(q));
    statusEl.innerHTML = `Товарів: <b>${filtered.length}</b> <span class="muted">(категорія: ${escapeHtml(activeCat === "__ALL__" ? "Усі" : activeCat)})</span>`;
    let renderGroups;
    if (activeCat === "__ALL__") {
      const byCat = new Map();
      for (const r of filtered) {
        if (!byCat.has(r.cat)) byCat.set(r.cat, []);
        byCat.get(r.cat).push(r);
      }
      renderGroups = [...byCat.entries()].sort((a,b) => b[1].length - a[1].length);
    } else {
      renderGroups = [[activeCat, filtered]];
    }
    outputEl.innerHTML = renderGroups.map(([cat, items]) => renderGroup(cat, items)).join("");
  }

  function renderCategories(q) {
    const counts = new Map();
    for (const [cat, items] of groups.entries()) {
      let list = items;
      if (q) list = list.filter(r => r._search.includes(q));
      counts.set(cat, list.length);
    }
    const total = rows.filter(r => !q || r._search.includes(q)).length;
    let html = `
      <div class="cat-chip ${activeCat === "__ALL__" ? "active" : ""}" data-cat="__ALL__">
        Усі <span class="badge">${total}</span>
      </div>
    `;
    [...groups.keys()].forEach(cat => {
      const c = counts.get(cat) || 0;
      html += `
        <div class="cat-chip ${activeCat === cat ? "active" : ""}" data-cat="${escapeHtml(cat)}">
          ${escapeHtml(cat)} <span class="badge">${c}</span>
        </div>
      `;
    });
    catBarEl.innerHTML = html;
    catBarEl.querySelectorAll(".cat-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        activeCat = chip.getAttribute("data-cat");
        render();
      });
    });
  }

  function renderGroup(cat, items){
    const groupId = "g_" + Math.abs(cat.split('').reduce((a, b) => ((a << 5) - a) + b.charCodeAt(0), 0));
    let html = `
      <div class="group">
        <div class="group-header" data-group-toggle="${groupId}">
          <div>${escapeHtml(cat)}</div>
          <small>Товарів: ${items.length}</small>
        </div>
        <div class="group-body" id="${groupId}">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Назва</th>
                <th>ID</th>
                <th>Ціна</th>
                <th>Опис</th>
                <th>Деталі</th>
              </tr>
            </thead>
            <tbody>
    `;
    for(let i = 0; i < items.length; i++){
      const r = items[i];
      const imgTag = r.picture
        ? `<img src="${escapeHtml(r.picture)}" alt="${escapeHtml(r.name)}" onerror="this.src='https://via.placeholder.com/120?text=Немає+фото';">`
        : "—";
      const descrShort = r.descr.length > 160 ? (r.descr.slice(0,160) + "...") : r.descr;
      html += `
        <tr>
          <td data-label="Фото">${imgTag}</td>
          <td data-label="Назва">${escapeHtml(r.name)}</td>
          <td data-label="ID">${escapeHtml(r.id)}</td>
          <td data-label="Ціна">${escapeHtml(r.price)}</td>
          <td data-label="Опис">${escapeHtml(descrShort)}</td>
          <td data-label="Деталі"><button class="details-btn" onclick="showModal('${escapeHtml(r.name)}', '${escapeHtml(r.id)}', '${escapeHtml(r.price)}', '${escapeHtml(r.picture)}', '${escapeHtml(r.descr)}', '${escapeHtml(r.cat)}')">Деталі</button></td>
        </tr>
      `;
    }
    html += `
            </tbody>
          </table>
        </div>
      </div>
    `;
    return html;
  }

  window.showModal = function(name, id, price, picture, descr, cat) {
    let html = `
      <h2>${escapeHtml(name)}</h2>
      <p><strong>ID:</strong> ${escapeHtml(id)}</p>
      <p><strong>Ціна:</strong> ${escapeHtml(price)}</p>
      <p><strong>Категорія:</strong> ${escapeHtml(cat)}</p>
      ${picture ? `<img src="${escapeHtml(picture)}" alt="${escapeHtml(name)}">` : "<p>Фото відсутнє</p>"}
      <p><strong>Повний опис:</strong><br>${escapeHtml(descr)}</p>
    `;
    modalBody.innerHTML = html;
    modal.style.display = "block";
  };

  load();
})();
</script>
</body>
</html>
